name: CI & deploy live demo

on:
  push:
    branches:
      - main
      - claude/watermelon-quality-detector-BAk6F
  pull_request:
  workflow_dispatch:

# Allow the deploy job to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Validation runs on every push and PR. This is the required green check.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Publishing to GitHub Pages only happens from main (after merge), and only
  # once Pages is enabled in Settings -> Pages -> Source: GitHub Actions.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5

      - id: deployment
        uses: actions/deploy-pages@v4
