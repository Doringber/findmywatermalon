name = "findmywatermelon-ai"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# API keys are SECRETS, not plaintext vars. Set whichever provider you use:
#   FREE  → npx wrangler secret put GEMINI_API_KEY     (key from aistudio.google.com)
#   Claude→ npx wrangler secret put ANTHROPIC_API_KEY
#
# The provider is auto-picked from whichever key is set. Force it with AI_PROVIDER below.
[vars]
ALLOWED_ORIGIN = "https://doringber.github.io"
# AI_PROVIDER = "gemini"          # "gemini" (free) or "anthropic" (paid)
# GEMINI_MODEL = "gemini-2.0-flash"
